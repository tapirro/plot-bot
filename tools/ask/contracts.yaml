# Block contracts — quality requirements per (type, role)
#
# Format:
#   type.role:
#     min: N          # minimum useful lines (below = stub)
#     max: N          # maximum before splitting (above = bloated)
#     format: list|table|prose|code|any   # expected content format
#     required: true  # must be present (complements blockSchemas)
#
# Violation types:
#   stub     — block < min lines (not distilled enough)
#   bloated  — block > max lines (needs splitting)
#   missing  — required block absent
#   hollow   — ## header exists but 0 content lines (real content in ### subsections)
#   format   — expected format not found (table but no |, list but no -, etc.)

# ── Pattern ──────────────────────────────────────────────

pattern.problem:
  min: 3
  max: 30
  format: prose
  required: true

pattern.solution:
  min: 5
  max: 60
  format: any
  required: true

pattern.implementation:
  min: 3
  max: 250
  format: any
  required: false

pattern.examples:
  min: 3
  max: 50
  format: any
  required: false

pattern.traps:
  min: 2
  max: 30
  format: list
  required: false

pattern.when-to-use:
  min: 2
  max: 20
  format: any
  required: false

pattern.adaptation:
  min: 3
  max: 50
  format: any
  required: false

pattern.origin:
  min: 1
  max: 15
  format: any
  required: false

pattern.references:
  min: 1
  max: 20
  format: list
  required: false

